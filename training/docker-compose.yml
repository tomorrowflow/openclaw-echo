services:
  recorder:
    build: microWakeWord-Trainer-Nvidia-Docker
    image: microwakeword-trainer
    volumes:
      - ./microWakeWord-Trainer-Nvidia-Docker/data:/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  caddy:
    image: caddy:2-alpine
    ports:
      - "9443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - recorder

volumes:
  caddy_data:
  caddy_config:
